name: run_coco

on:
  schedule:
    # ➔ 改为北京时间 08:43 触发
    - cron: '43 3 * * *'
      timezone: 'Asia/Shanghai'  # ✨ 2026年新支持的参数，直接锁定北京时间
  workflow_dispatch:
    inputs:
      name:
        description: 'Name'
        required: true
        default: '邮箱'

permissions:
  contents: write
  pull-requests: write

jobs:
  run-and-commit:
    runs-on: 	macos-latest
    env:
      TZ: Asia/Shanghai

    steps:
    # 拉取代码
    - uses: actions/checkout@v4
      with:
        clean: true

    # 设置 Python 3.12
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"

    # 安装依赖（如果有 requirements.txt）
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 运行 hx.py 脚本
    - name: Run coco.py
      run: python coco/coco.py "${{ github.event.inputs.name }}"
      env:
        APP_ID: ${{ secrets.APP_ID }}
        ydyp: ${{ secrets.ydyp }}

    - name: Commit all changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # 添加所有修改和新文件，同时保留目录结构
        git add -A
        # 如果有变化则提交
        git diff-index --quiet HEAD || git commit -m "Update all modified files"

    # 推送到 main 分支
    - name: Push changes
      uses: ad-m/github-push-action@v0.8.0
      with:
        github_token: ${{ secrets.TOKEN }}
        branch: main
